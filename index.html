<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telomerase Lab - Biology@RI</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, Arial; }
        #app { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; user-select: none; -webkit-user-select: none; }
        
        .header { text-align: center; margin-top: 15px; line-height: 1.2; z-index: 10; width: 90%; }
        /* First line reduced by 20%, Sub-heading enlarged 30% and darkened 20% */
        .t-main { font-size: 21px; font-weight: 600; color: #000; letter-spacing: -0.2px; }
        .t-sub { font-size: 14px; color: rgba(0,0,0,0.48); margin-top: 6px; font-weight: 700; letter-spacing: 0.5px; }

        #stage { width: 100%; height: 45%; touch-action: none; margin-top: 10px; }
        
        .controls { width: 100%; flex-grow: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
        .counter { font-size: 12px; color: #000; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 20px; }
        
        /* Functional Block: Pause and Restart */
        .func-block { position: absolute; right: 5px; top: 0; display: flex; flex-direction: column; gap: 8px; }
        #pauseBtn, #restartIconBtn { width: 38px; height: 38px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #fff; border: 2px solid #000; border-radius: 6px; box-sizing: border-box; }
        .p-icon { width: 12px; height: 14px; border-left: 4px solid #000; border-right: 4px solid #000; }
        .play-icon { width: 0; height: 0; border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-left: 12px solid #000; margin-left: 4px; }
        .r-icon { font-size: 20px; font-weight: bold; color: #000; }

        .btn-minimal { background: #888; color: #fff; border: none; padding: 14px 30px; border-radius: 12px; font-size: 13px; font-weight: 500; letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; margin: 5px; min-width: 240px; }
        .btn-minimal:active { background: #666; transform: scale(0.97); }

        .hint { font-size: 13px; color: #666; margin-bottom: 12px; font-weight: 600; height: 18px; text-align: center; }
        .footer { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 10px; color: #bbb; pointer-events: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="app">
        <div class="header">
            <div class="t-main">Prok and Euk Genome & Org Telomerase</div>
            <div class="t-sub">Biology@RI</div>
        </div>

        <canvas id="stage"></canvas>

        <div class="controls">
            <div class="func-block">
                <div id="pauseBtn" style="display:none;"><div class="p-icon" id="pIcon"></div></div>
                <div id="restartIconBtn" style="display:none;"><div class="r-icon">↺</div></div>
            </div>
            
            <div class="counter" id="repeatCounter"># of repeats: 0</div>
            <div class="hint" id="statusHint"></div>
            
            <button class="btn-minimal" id="extendBtn">Begin: extend DNA</button>
            <button class="btn-minimal" id="continueBtn" style="display:none; background:#444;">Continue: convert to ds DNA</button>
            <button class="btn-minimal" id="restartBtn" style="display:none; background:#aaa;">Restart</button>
        </div>

        <div class="footer">All rights reserved</div>
    </div>

    <script>
    (function(){
        // Obfuscated Security Layer
        const _0x1f = {
            'm1': "MOVE_IN", 's1': "SYNTH", 't1': "TRANSLOCATE", 
            'f1': "FADE_OUT", 'p1': "PRIMER", 'd1': "DS_SYNTH", 'e1': "DONE"
        };
        const _protect = () => {
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.onkeydown = (e) => {
                if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) return false;
            };
        }; _protect();

        const canvas = document.getElementById('stage');
        const ctx = canvas.getContext('2d');
        const counterEl = document.getElementById('repeatCounter');
        const hintEl = document.getElementById('statusHint');
        const btnE = document.getElementById('extendBtn');
        const btnC = document.getElementById('continueBtn');
        const btnR = document.getElementById('restartBtn');
        const pBtn = document.getElementById('pauseBtn');
        const rIconBtn = document.getElementById('restartIconBtn');
        const pIcon = document.getElementById('pIcon');
        
        let dpr = window.devicePixelRatio || 1;
        let w, h, midX;
        
        const DNA_T = 4;
        const GAP = 18; 
        const B_SIZE = 16; 
        const UNIT_S = B_SIZE * 1.1; 
        
        let _st = "IDLE", paused = false, extY = 0, dsC = 0, reps = 0, telY = -200, enzO = 1, priO = 0, bCount = 0, lT = 0, priT = 0, priV = false;

        const colors = { 'T': '#FFCC00', 'A': '#FF3B30', 'G': '#4CD964', 'C': '#5AC8FA', 'U': '#FF5E00' };
        const dnaSeq = ['T','T','A','G','G','G','T'];
        const dsSeq = ['A','A','T','C','C','C','A','A','T','C','C','C','A','A','T','C','C','C','A','C'];
        const rnaSeq = ['A','A','U','C','C','C','A'];

        function init() {
            w = canvas.width = window.innerWidth * dpr;
            h = canvas.height = (window.innerHeight * 0.45) * dpr;
            ctx.scale(dpr, dpr);
            midX = (window.innerWidth / 2);
        }

        function drawEnzyme(x, y, op) {
            ctx.save();
            ctx.globalAlpha = op;
            // Vertical Enzyme logic
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(Math.PI / 2);
            ctx.scale(0.8 * 0.9, 0.8); // 10% reduction on side
            ctx.beginPath();
            ctx.moveTo(0,0);
            ctx.bezierCurveTo(-40, -35, 80, -80, 200, -45); 
            ctx.bezierCurveTo(240, -10, 220, 70, 150, 80);  
            ctx.bezierCurveTo(50, 90, -30, 60, -25, 0);
            ctx.closePath();
            ctx.fillStyle = "rgba(160, 160, 160, 0.4)"; 
            ctx.fill();
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.restore();

            // RNA Bases (Perfectly perpendicular)
            const rX = x + 12; const rY = y + 10;
            ctx.fillStyle = "#8E44AD"; ctx.font = "bold 10px 'Courier New'"; ctx.textAlign = "center";
            rnaSeq.forEach((base, i) => {
                ctx.fillText(base, rX, rY + (i * UNIT_S));
            });
            ctx.restore();
        }

        function drawBase(type, x, y, op=1, grey=false, isP=false) {
            ctx.save();
            ctx.globalAlpha = op;
            ctx.fillStyle = isP ? "#FF8C00" : colors[type];
            ctx.fillRect(x - B_SIZE/2, y - B_SIZE/2, B_SIZE, B_SIZE);
            if(!isP) {
                ctx.fillStyle = grey ? "#aaa" : "#fff";
                ctx.font = "bold 10px 'Courier New'"; ctx.textAlign = "center";
                ctx.fillText(type, x, y + 4);
            }
            ctx.restore();
        }

        function engine() {
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            const startY = 40; const templateL = 100; const synthY = startY + templateL;
            
            // Vertical Strands
            ctx.lineWidth = DNA_T; ctx.strokeStyle = "#000"; ctx.lineCap = "butt";
            
            // Strand A (Left Template)
            const leftX = midX - GAP;
            ctx.beginPath();
            ctx.moveTo(leftX, startY);
            ctx.lineTo(leftX, synthY + (bCount * UNIT_S));
            ctx.stroke();
            ctx.fillStyle = "#000"; ctx.font = "bold 10px Arial";
            ctx.fillText("5'", leftX, startY - 10);
            ctx.fillText("3'", leftX, synthY + (bCount * UNIT_S) + 18);

            // Strand B (Right Short)
            const rightX = midX + GAP;
            const uEnd = startY + 60;
            ctx.beginPath();
            ctx.moveTo(rightX, startY);
            ctx.lineTo(rightX, uEnd);
            ctx.stroke();
            ctx.fillText("3'", rightX, startY - 10);
            ctx.fillStyle = (_st === "DS_SYNTH" || _st === "FINAL") ? "#aaa" : "#000";
            ctx.fillText("5'", rightX, uEnd + 15);

            // Nucleotides
            for(let i=0; i<bCount; i++) {
                // DNA base center aligned 90 deg to counterpart
                drawBase(dnaSeq[i%7], leftX, synthY + (i * UNIT_S) + (UNIT_S/2));
            }

            if(priV) {
                const pLen = UNIT_S * 4;
                const pY = synthY + (bCount * UNIT_S) - pLen;
                ctx.save(); ctx.globalAlpha = priO; ctx.fillStyle = "#FF8C00";
                ctx.fillRect(rightX - B_SIZE/2, pY, B_SIZE, pLen); ctx.restore();
            }

            for(let i=0; i<dsC; i++) {
                const idx = (bCount - 1) - i;
                drawBase(dsSeq[i%dsSeq.length], rightX, synthY + (idx * UNIT_S) + (UNIT_S/2), 1, true);
            }

            // Animation
            const now = Date.now();
            if(!paused) {
                if(_st === _0x1f.m1) {
                    let target = synthY - 20; telY += (target - telY) * 0.08;
                    if(Math.abs(telY - target) < 1) { _st = _0x1f.s1; lT = now; }
                } else if(_st === _0x1f.s1) {
                    if(now - lT > 520) { // 30% slower
                        bCount++; lT = now;
                        if(bCount % 7 === 0) {
                            reps = Math.min(3, Math.floor(bCount/7));
                            counterEl.innerText = `# of repeats: ${reps}`;
                            if(reps < 3) _st = _0x1f.t1;
                            else { 
                                _st = "FINISHED"; btnC.style.display = "block"; pBtn.style.display = "none";
                                hintEl.innerText = "synthesis of first strand complete"; 
                            }
                        }
                    }
                } else if(_st === _0x1f.t1) {
                    let target = synthY + (bCount - 1) * UNIT_S - 20; telY += (target - telY) * 0.08;
                    if(Math.abs(telY - target) < 1) { _st = _0x1f.s1; lT = now; }
                } else if(_st === _0x1f.f1) {
                    enzO -= 0.03; if(enzO <= 0) { enzO = 0; _st = _0x1f.p1; priT = now; priV = true; }
                } else if(_st === _0x1f.p1) {
                    priO = Math.min(1, priO + 0.05);
                    if(now - priT > 4000) _st = _0x1f.d1;
                } else if(_st === _0x1f.d1) {
                    priO = Math.max(0, priO - 0.05);
                    if(now - lT > 400) {
                        dsC++; lT = now;
                        if(dsC >= bCount + 1) { _st = "FINAL"; hintEl.innerText = "double stranded DNA formed"; btnR.style.display = "block"; rIconBtn.style.display = "none"; }
                    }
                }
            }
            if(enzO > 0 && telY > -300) drawEnzyme(leftX - 10, telY, enzO);
            requestAnimationFrame(engine);
        }

        btnE.onclick = () => { _st = _0x1f.m1; btnE.style.display = "none"; pBtn.style.display = "flex"; rIconBtn.style.display = "flex"; };
        btnC.onclick = () => { _st = _0x1f.f1; btnC.style.display = "none"; hintEl.innerText = "Synthesising complementary DNA"; };
        btnR.onclick = rIconBtn.onclick = () => location.reload();
        pBtn.onclick = () => { paused = !paused; pIcon.className = paused ? "play-icon" : "p-icon"; };

        window.addEventListener('resize', init);
        init(); engine();
    })();
    </script>
</body>
</html>
